<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Médicos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #e8f1ff;
            min-height: 100vh;
            padding: 40px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .titulo {
            text-align: center;
            color: #0d47a1;
            margin-bottom: 30px;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #1565c0;
            color: white;
        }

        th,
        td {
            padding: 14px;
            text-align: left;
        }

        tbody tr:nth-child(even) {
            background-color: #f5f9ff;
        }

        tbody tr:hover {
            background-color: #d6e8ff;
            transition: 0.3s;
        }

        .btn {
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            margin-right: 5px;
            display: inline-block;
        }

        .btn-editar {
            background-color: #1976d2;
        }

        .btn-eliminar {
            background-color: #d32f2f;
        }

        .btn-editar:hover {
            background-color: #0d47a1;
        }

        .btn-eliminar:hover {
            background-color: #b71c1c;
        }

        .sin-registros {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1 class="titulo">Listado de Médicos</h1>

        <div class="card">

            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Especialidad</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>

                    {% for medico in lista_medicos %}
                    <tr>
                        <td>{{ medico.nombre }}</td>
                        <td>{{ medico.apellido }}</td>
                        <td>{{ medico.get_especialidad_display }}</td>
                        <td>
                            <a href="{% url 'ver_medico' medico.code %}" class="btn btn-eliminar">Ver</a>
                            <a href="#" class="btn btn-editar">Editar</a>
                            <a href="#" class="btn btn-eliminar">Eliminar</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" class="sin-registros">
                            No hay médicos registrados.
                        </td>
                    </tr>
                    {% endfor %}

                </tbody>
            </table>

        </div>

    </div>

</body>
</html>
