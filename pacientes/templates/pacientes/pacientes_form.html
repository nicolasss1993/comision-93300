{% extends "medicos/index.html" %}

{% block titulo %}
<title>Editar Paciente</title>
{% endblock %}

{% block contenido %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow">

                <div class="card-header bg-warning">

                    <h3>Editar Paciente</h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        {{ form.as_p }}

                        <div class="d-flex justify-content-between">

                            <a href="{% url 'detalle_paciente' object.code %}" class="btn btn-secondary">

                                Cancelar

                            </a>

                            <button class="btn btn-warning">

                                Guardar Cambios

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}

{% block cartas %}{% endblock %}
