{% extends "medicos/index.html" %}

{% block titulo %}
<title>Eliminar Paciente</title>
{% endblock %}

{% block contenido %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card border-danger shadow">

                <div class="card-header bg-danger text-white">

                    <h3>Eliminar Paciente</h3>

                </div>

                <div class="card-body text-center">

                    <h5>

                        ¿Está seguro de eliminar al paciente?

                    </h5>

                    <h4 class="my-4">

                        <strong>

                            {{ object.nombre }} {{ object.apellido }}

                        </strong>

                    </h4>

                    <form method="POST">

                        {% csrf_token %}

                        <a href="{% url 'detalle_paciente' object.code %}" class="btn btn-secondary">

                            Cancelar

                        </a>

                        <button class="btn btn-danger">

                            Eliminar

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}

{% block cartas %}{% endblock %}
